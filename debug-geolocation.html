<!DOCTYPE html>
<html>
<head>
    <title>Test Geolocalizzazione Debug</title>
</head>
<body>
    <h1>🧪 Test Geolocalizzazione Debug</h1>
    
    <div>
        <h2>1. Verifica supporto Geolocalizzazione</h2>
        <p id="geolocation-support"></p>
        
        <h2>2. Verifica Token</h2>
        <p id="token-status"></p>
        
        <h2>3. Test Geolocalizzazione</h2>
        <button onclick="testGeolocation()">🎯 Test Posizione</button>
        <div id="result"></div>
        
        <h2>4. Logs</h2>
        <div id="logs"></div>
    </div>

    <script>
        // Funzione per aggiungere log
        function addLog(message) {
            const logs = document.getElementById('logs');
            logs.innerHTML += '<p>' + new Date().toLocaleTimeString() + ': ' + message + '</p>';
            console.log(message);
        }

        // 1. Verifica supporto geolocalizzazione
        const geoSupport = document.getElementById('geolocation-support');
        if (navigator.geolocation) {
            geoSupport.innerHTML = '✅ Geolocalizzazione supportata';
        } else {
            geoSupport.innerHTML = '❌ Geolocalizzazione non supportata';
        }

        // 2. Verifica token
        const tokenStatus = document.getElementById('token-status');
        const token = localStorage.getItem('token');
        if (token) {
            tokenStatus.innerHTML = '✅ Token presente: ' + token.substring(0, 50) + '...';
        } else {
            tokenStatus.innerHTML = '❌ Token non presente - Effettua il login prima';
            // Imposta token di test
            const testToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2OGI0NzJiMjE4ZDA1MjQ5ZjJhOWZlNzciLCJlbWFpbCI6Im1hcmlvQGVtYWlsLmNvbSIsImlhdCI6MTc1NjgyOTgzNiwiZXhwIjoxNzU2OTE2MjM2fQ.NrL1mDpmaYBTyDgrVDhgN_GPUYKm60Wb5nMbMZmAyOk';
            localStorage.setItem('token', testToken);
            tokenStatus.innerHTML += '<br>🔧 Token di test impostato automaticamente';
        }

        // 3. Test geolocalizzazione
        async function testGeolocation() {
            const result = document.getElementById('result');
            result.innerHTML = '🔄 Testando geolocalizzazione...';
            
            try {
                addLog('🎯 Iniziando test geolocalizzazione...');
                
                // Test navigator.geolocation
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(
                        resolve,
                        reject,
                        {
                            enableHighAccuracy: true,
                            timeout: 10000,
                            maximumAge: 300000
                        }
                    );
                });
                
                const coords = {
                    lat: position.coords.latitude,
                    lng: position.coords.longitude
                };
                
                addLog('✅ Coordinate ottenute: ' + JSON.stringify(coords));
                
                // Test reverse geocoding
                addLog('🔄 Testando reverse geocoding...');
                const response = await fetch('http://localhost:8080/api/maps/reverse-geocode', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    },
                    body: JSON.stringify(coords)
                });
                
                addLog('📡 Risposta server: ' + response.status);
                const data = await response.json();
                addLog('📋 Dati ricevuti: ' + JSON.stringify(data));
                
                result.innerHTML = `
                    <h3>✅ Test completato con successo!</h3>
                    <p><strong>Coordinate:</strong> ${coords.lat}, ${coords.lng}</p>
                    <p><strong>Indirizzo:</strong> ${data.formattedAddress || 'N/A'}</p>
                `;
                
            } catch (error) {
                addLog('❌ Errore: ' + error.message);
                result.innerHTML = `
                    <h3>❌ Test fallito</h3>
                    <p><strong>Errore:</strong> ${error.message}</p>
                `;
            }
        }
    </script>
</body>
</html>
